syntax = "proto3";

package classifier;

option go_package = "issuetracker/internal/classifier/grpc/pb";

// ─── 공통 메시지 ──────────────────────────────────────────────────────────────

message CategoryInput {
  string name        = 1;  // 카테고리 식별자
  string description = 2;  // LLM 프롬프트에 포함될 설명
}

message ClassifyResult {
  string label      = 1;  // 예측 카테고리
  string reason     = 2;  // LLM 근거 (1문장)
  bool   parse_ok   = 3;  // 파싱 성공 여부
  string raw_output = 4;  // parse_ok=false 일 때 LLM 원본 출력 (그 외 빈 문자열)
}

// ─── /classify ────────────────────────────────────────────────────────────────

message ClassifyRequest {
  string text                       = 1;  // 분류할 텍스트
  repeated CategoryInput categories = 2;  // 생략 시 기본 카테고리 사용
}

message ClassifyResponse {
  ClassifyResult result = 1;
}

// ─── /classify/batch ─────────────────────────────────────────────────────────

message BatchClassifyRequest {
  repeated string        texts      = 1;  // 분류할 텍스트 목록 (최대 100건)
  repeated CategoryInput categories = 2;  // 생략 시 기본 카테고리 사용
}

message BatchClassifyItem {
  int32          index        = 1;
  string         text_preview = 2;  // 입력 텍스트 앞 100자
  ClassifyResult result       = 3;
}

message BatchClassifyResponse {
  int32                      total   = 1;
  repeated BatchClassifyItem results = 2;
}

// ─── /health ──────────────────────────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
  string status                 = 1;  // "ok" | "degraded"
  bool   model_loaded           = 2;
  string model_path             = 3;  // 미로드 시 빈 문자열
  int32  default_category_count = 4;
}

// ─── 서비스 ───────────────────────────────────────────────────────────────────

service ClassifierService {
  rpc Classify      (ClassifyRequest)      returns (ClassifyResponse);
  rpc ClassifyBatch (BatchClassifyRequest) returns (BatchClassifyResponse);
  rpc Health        (HealthRequest)        returns (HealthResponse);
}
