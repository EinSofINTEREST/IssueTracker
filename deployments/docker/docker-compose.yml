# ─────────────────────────────────────────────────────────────
# IssueTracker 개발용 인프라 스택
#
# 구성:
#   postgres   – PostgreSQL 15 (데이터 영속화)
#   kafka      – KRaft 모드 단일 브로커 (Zookeeper 불필요)
#   kafka-init – 애플리케이션 토픽 사전 생성 (1회성)
#   kafka-ui   – 브라우저 기반 토픽/메시지 뷰어 (http://localhost:8080)
#
# 리스너 (Kafka):
#   PLAINTEXT  → localhost:9092  (호스트 → 컨테이너, Go 앱 연결용)
#   INTERNAL   → kafka:29092     (컨테이너 내부 통신용)
#   CONTROLLER → kafka:9093      (KRaft 컨트롤러 전용)
# ─────────────────────────────────────────────────────────────

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 15 – 메인 데이터베이스
  # localhost:5432 / DB: issuetracker
  # DEV 환경에서는 local postgres 사용
  # ─────────────────────────────────────────────────────────────
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: issuetracker-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-postgres}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #     POSTGRES_DB: ${POSTGRES_DB:-issuetracker}
  #   volumes:
  #     - /data/ELArchive/issuetracker/postgres:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-issuetracker}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 20s
  #   restart: unless-stopped


  # ─────────────────────────────────────────────────────────────
  # Redis 7 – 분산 락 및 캐시
  # localhost:6379
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: issuetracker-redis
    ports:
      - "6379:6379"
    volumes:
      - /data/ELArchive/issuetracker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: issuetracker-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft 모드 (Zookeeper 불필요)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # 리스너 설정
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # 개발용 단일 브로커 최소 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 데이터 저장 경로 (볼륨 마운트 대상)
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # 개발용 설정
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24

    volumes:
      - /data/ELArchive/issuetracker/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 토픽 초기화 (Kafka 기동 완료 후 1회 실행 후 종료)
  # ─────────────────────────────────────────────────────────────
  kafka-init:
    image: apache/kafka:latest
    container_name: issuetracker-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    # 아키텍처 문서(01-architecture.md) 기준 토픽 목록
    # 개발용 단일 브로커이므로 replication-factor=1, partitions 축소
    command:
      - bash
      - -c
      - |
        set -e
        KAFKA=kafka:29092
        T=/opt/kafka/bin/kafka-topics.sh

        echo '=== IssueTracker Kafka Topic Initialization ==='

        echo '[crawl topics]'
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.crawl.high     --partitions ${KAFKA_PARTITIONS_HIGH:-6} --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.crawl.normal   --partitions ${KAFKA_PARTITIONS_NORMAL:-8} --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.crawl.low      --partitions ${KAFKA_PARTITIONS_LOW:-4} --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.crawl.chromedp --partitions ${KAFKA_PARTITIONS_CHROMEDP:-4} --replication-factor 1

        echo '[raw topics]'
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.raw.us       --partitions 8 --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.raw.kr       --partitions 8 --replication-factor 1

        echo '[fetched topics]'
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.fetched     --partitions 8 --replication-factor 1

        echo '[pipeline topics]'
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.normalized   --partitions 8 --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.validated    --partitions 8 --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.enriched     --partitions 8 --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.embedded     --partitions 4 --replication-factor 1
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.clusters     --partitions 4 --replication-factor 1

        echo '[system topics]'
        $$T --bootstrap-server $$KAFKA --create --if-not-exists --topic issuetracker.dlq          --partitions 4 --replication-factor 1

        echo ''
        echo '=== Topics Created ==='
        $$T --bootstrap-server $$KAFKA --list
    restart: on-failure

  # ─────────────────────────────────────────────────────────────
  # Kafka UI – 브라우저에서 토픽/메시지 확인
  # http://localhost:8080
  # ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: issuetracker-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=issuetracker-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Chrome (chromedp) – worker:Chrome 1:1 매핑 (이슈 #230)
  #
  # 단일 서비스 + scale 패턴: 운영자가 `docker compose up --scale chrome=N` 으로 N개 replica 기동.
  # compose 가 자동으로 chrome-1, chrome-2, ..., chrome-N 호스트명 부여 (compose v2 + DNS 등록).
  #
  # 호스트 포트는 range 로 매핑 — N replica 까지 자동 할당 (default 9222-9229 = 8개까지).
  # range 가 부족하면 .env 의 FETCHER_CHROMEDP_HOST_PORT_RANGE 로 확장 (예: 9222-9239).
  #
  # 앱 측 RemoteURLs 도 동기화: .env 의 FETCHER_CHROMEDP_REMOTE_URL_PATTERN 이 {n} placeholder 를
  # 1..WorkerCount 로 치환하여 자동 생성 — WorkerCount 와 scale 만 일치시키면 됨.
  #
  # 운영 워크플로:
  #   1. .env 의 FETCHER_CHROMEDP_WORKER_COUNT 조정
  #   2. docker compose up -d --scale chrome=$WORKER_COUNT
  #   (PATTERN 이 ws://chrome-{n}:9222 default 라 자동 매핑)
  # ─────────────────────────────────────────────────────────────
  chrome:
    image: chromedp/headless-shell:latest
    # container_name 은 scale 시 충돌 → 미설정. compose 가 <project>-chrome-{n} 형태로 자동 부여.
    ports:
      - "${FETCHER_CHROMEDP_HOST_PORT_RANGE:-9222-9229}:9222"
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9222/json/version > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

