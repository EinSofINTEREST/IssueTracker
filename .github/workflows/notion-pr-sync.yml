name: Notion PR Sync

on:
  pull_request:
    types: [opened, reopened, edited, synchronize, closed]
  workflow_dispatch:
    inputs:
      full_resync:
        description: "Delete all rows and rebuild from GitHub (open + merged)"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: notion-pr-sync-${{ github.event.pull_request.number || 'manual' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync to Notion
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${NOTION_API_TOKEN:-}" ]; then
            echo "::warning::NOTION_API_TOKEN secret is not configured (set at org level) — skipping sync."
            exit 0
          fi
          MODE=event
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.full_resync }}" = "true" ]; then
              MODE=backfill
            else
              echo "::error::workflow_dispatch requires full_resync=true. Event mode needs a pull_request context."
              exit 1
            fi
          fi
          echo "running mode=$MODE"
          python scripts/notion_pr_sync.py --mode "$MODE"
